<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 112" fill="none">
  <style>
    svg {
      --logo-shadow: rgb(17 17 17 / 0.14);
      --logo-base: #111111;
      --logo-accent: #8c8c8c;
      --logo-line: #8c8c8c;
      --logo-node: #bebebe;
    }

    @media (prefers-color-scheme: dark) {
      svg {
        --logo-shadow: rgb(158 158 158 / 0.22);
        --logo-base: #ffffff;
        --logo-accent: #9e9e9e;
        --logo-line: #9e9e9e;
        --logo-node: #707070;
      }
    }

    .logo-shadow {
      fill: var(--logo-shadow);
    }

    .logo-base {
      fill: var(--logo-base);
    }

    .logo-accent {
      fill: var(--logo-accent);
    }

    .logo-linework {
      fill: none;
      stroke: var(--logo-line);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 4;
      opacity: 0.88;
    }

    .logo-nodes {
      fill: var(--logo-node);
      opacity: 0.9;
    }

  </style>
  <g transform="translate(8 8) scale(0.44)">
    <g class="logo-shadow" transform="translate(14 14)">
      <rect x="34" y="24" width="30" height="176" rx="9" />
      <rect x="138" y="24" width="30" height="176" rx="9" />
      <polygon points="64,24 94,24 168,152 168,200 138,200 64,72" />
      <rect x="236" y="24" width="30" height="176" rx="9" />
      <rect x="340" y="24" width="30" height="176" rx="9" />
      <rect x="340" y="170" width="146" height="30" rx="9" />
    </g>
    <g class="logo-base">
      <rect x="34" y="24" width="30" height="176" rx="9" />
      <rect x="138" y="24" width="30" height="176" rx="9" />
      <polygon points="64,24 94,24 168,152 168,200 138,200 64,72" />
      <rect x="236" y="24" width="30" height="176" rx="9" />
      <rect x="340" y="24" width="30" height="176" rx="9" />
      <rect x="340" y="170" width="146" height="30" rx="9" />
    </g>
    <g class="logo-accent">
      <polygon points="64,24 94,24 145,112 115,112" />
      <rect x="236" y="24" width="30" height="46" rx="9" />
      <rect x="340" y="170" width="92" height="30" rx="9" />
    </g>
    <g class="logo-linework">
      <path d="M10 12H134" />
      <path d="M438 12H510V84" />
      <path d="M10 186V212H84" />
      <path d="M372 212H510" />
      <path d="M86 46H156" />
      <path d="M318 180H464" />
    </g>
    <g class="logo-nodes">
      <circle cx="10" cy="12" r="6" />
      <circle cx="510" cy="84" r="6" />
      <circle cx="84" cy="212" r="6" />
    </g>
  </g>
</svg>
