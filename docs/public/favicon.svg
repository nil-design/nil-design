<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <style>
    svg {
      --favicon-badge: oklch(99% 0 0);
      --favicon-base: oklch(15% 0 0);
      --favicon-accent: #8c8c8c;
    }

    @media (prefers-color-scheme: dark) {
      svg {
        --favicon-badge: oklch(14% 0 0);
        --favicon-base: oklch(98% 0 0);
        --favicon-accent: #9e9e9e;
      }
    }

    .icon-badge {
      fill: var(--favicon-badge);
    }

    .icon-base {
      fill: var(--favicon-base);
    }

    .icon-accent {
      fill: var(--favicon-accent);
    }
  </style>
  <rect class="icon-badge" x="0" y="0" width="64" height="64" rx="18"/>
  <g transform="translate(20.7 17.2) scale(0.168)">
    <rect class="icon-base" x="0" y="0" width="30" height="176" rx="9"/>
    <rect class="icon-base" x="104" y="0" width="30" height="176" rx="9"/>
    <polygon class="icon-base" points="30,0 60,0 134,128 134,176 104,176 30,48"/>
    <polygon class="icon-accent" points="30,0 60,0 111,88 81,88"/>
  </g>
</svg>
